<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Icon · render</title>
<style>
  :root {
    --bg:     #0a0a0c;
    --fg:     #ededee;
    --accent: #5eead4;
    --sans:   -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 100vw; height: 100vh;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--fg);
    font-family: var(--sans);
    overflow: hidden;
  }
  .M {
    font-size: 75vmin;
    font-weight: 500;
    letter-spacing: -0.06em;
    line-height: 0.85;
    color: var(--fg);
    margin: 0;
    /* Slight optical lift so the underline below sits in the right relation */
    transform: translateY(-2%);
  }
  .underline {
    width: 32vmin;
    height: 5vmin;
    border-radius: 999px;
    background: var(--accent);
    margin-top: 4vmin;
  }
</style>
</head>
<body>
  <div class="M">M</div>
  <div class="underline"></div>
</body>
</html>
