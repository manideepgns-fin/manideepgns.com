<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OG · manideepgns.com</title>
<style>
  :root {
    --bg:        #0a0a0c;
    --bg-card:   #131316;
    --line:      #1f1f23;
    --line-strong: #2a2a30;
    --fg:        #ededee;
    --fg-dim:    #b3b4b6;
    --fg-mute:   #87898c;
    --accent:    #5eead4;       /* teal */
    --accent-2:  #c084fc;       /* violet */
    --accent-3:  #22d3ee;       /* cyan */
    --green:     #4ade80;
    --sans:  -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --mono:  ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    position: relative;
    font-feature-settings: 'tnum', 'kern', 'liga';
  }

  /* Subtle background flourish — radial gradient hint of accent colors */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 88% 18%, rgba(192,132,252,0.06), transparent 38%),
      radial-gradient(circle at 12% 82%, rgba(34,211,238,0.05), transparent 42%);
    pointer-events: none;
  }

  .canvas {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    padding: 64px 80px;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }

  /* ── Top row ── */
  .top-row {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 14px;
    color: var(--fg-mute); letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .top-row .brand {
    display: inline-flex; align-items: center; gap: 14px;
  }
  .top-row .brand::before {
    content: ''; width: 22px; height: 1px;
    background: var(--accent);
    display: inline-block;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 13px;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(74,222,128,0.10);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.20);
    letter-spacing: 0.04em;
    text-transform: none;
  }
  .pill::before {
    content: ''; width: 7px; height: 7px;
    border-radius: 999px;
    background: var(--green);
    box-shadow: 0 0 8px rgba(74,222,128,0.7);
  }

  /* ── Center stack ── */
  .center {
    display: flex; flex-direction: column;
    gap: 24px;
  }

  .name {
    font-size: 108px;
    font-weight: 500; letter-spacing: -0.042em;
    line-height: 1;
    margin: 0;
    color: var(--fg);
  }

  .identity {
    font-family: var(--mono); font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: var(--fg-dim);
    margin: 0;
  }
  .identity .x1 { color: var(--accent); }
  .identity .x2 { color: var(--accent-3); }
  .identity .x3 { color: var(--accent-2); }

  .thesis {
    font-size: 38px; font-weight: 500;
    letter-spacing: -0.024em;
    line-height: 1.25;
    color: var(--fg);
    margin: 0;
    max-width: 900px;
  }
  .thesis em {
    font-style: italic;
    background: linear-gradient(95deg, var(--accent) 0%, var(--accent-3) 60%, var(--accent-2) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  /* ── Bottom row ── */
  .bottom-row {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 14px;
    color: var(--fg-mute); letter-spacing: 0.04em;
  }
  .bottom-row strong { color: var(--fg-dim); font-weight: 500; }
  .bottom-row .meta { display: inline-flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .bottom-row .sep {
    width: 1px; height: 12px; background: var(--line-strong);
    display: inline-block;
  }
  .bottom-row .corner {
    font-size: 12px;
    color: var(--fg-soft, #555558);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="canvas">

    <div class="top-row">
      <span class="brand">manideepgns.com</span>
      <span class="pill">Open to advisory</span>
    </div>

    <div class="center">
      <h1 class="name">Manideep GNS</h1>
      <p class="identity">Finance <span class="x1">×</span> Curiosity <span class="x2">×</span> Code</p>
      <p class="thesis">I treat finance like <em>engineering.</em></p>
    </div>

    <div class="bottom-row">
      <span class="meta">
        <span><strong>Head of Finance</strong>, UrbanPiper</span>
        <span class="sep"></span>
        <span>4 entities · team of 7</span>
        <span class="sep"></span>
        <span>Building <strong>Atlance</strong></span>
      </span>
      <span class="corner">CA · ICAI Nov 2023</span>
    </div>

  </div>
</body>
</html>
